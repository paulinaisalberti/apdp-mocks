<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APDP — Asistente Conversacional B2B</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 480px;
    height: 90vh;
    max-height: 800px;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(135deg, #1F4E79 0%, #2E75B6 100%);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 44px;
    height: 44px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1F4E79;
    font-weight: bold;
    font-size: 18px;
  }
  .header-info h1 { font-size: 16px; font-weight: 600; }
  .header-info p { font-size: 12px; opacity: 0.9; display: flex; align-items: center; gap: 6px; }
  .status-dot {
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
  }
  .demo-banner {
    background: #fef3c7;
    color: #92400e;
    padding: 8px 12px;
    font-size: 11px;
    text-align: center;
    border-bottom: 1px solid #fde68a;
  }
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f3f4f6;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .message {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.45;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .message.bot {
    background: white;
    color: #1f2937;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .message.user {
    background: #2E75B6;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .message.system {
    align-self: center;
    background: #e0e7ff;
    color: #3730a3;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 10px;
  }
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
  }
  .typing span {
    width: 6px; height: 6px;
    background: #9ca3af;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
  .quick-replies {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-self: flex-start;
    max-width: 90%;
  }
  .quick-replies button {
    background: white;
    border: 1px solid #d1d5db;
    color: #1F4E79;
    padding: 6px 12px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .quick-replies button:hover {
    background: #1F4E79;
    color: white;
    border-color: #1F4E79;
  }
  .input-area {
    padding: 12px;
    background: white;
    border-top: 1px solid #e5e7eb;
    display: flex;
    gap: 8px;
  }
  .input-area input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #d1d5db;
    border-radius: 24px;
    font-size: 14px;
    outline: none;
  }
  .input-area input:focus { border-color: #2E75B6; }
  .input-area button {
    background: #1F4E79;
    color: white;
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.15s;
  }
  .input-area button:hover { background: #2E75B6; }
  .product-card {
    background: #f9fafb;
    border-left: 3px solid #1F4E79;
    padding: 10px;
    border-radius: 8px;
    margin-top: 8px;
    font-size: 13px;
  }
  .product-card strong { color: #1F4E79; }
  .stock-ok { color: #16a34a; font-weight: 600; }
  .stock-low { color: #ea580c; font-weight: 600; }
  .stock-out { color: #dc2626; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar">AP</div>
    <div class="header-info">
      <h1>APDP Asistente</h1>
      <p><span class="status-dot"></span>En línea — 24/7</p>
    </div>
  </div>
  <div class="demo-banner">⚠ Mock de demostración — Iniciativa A del TP de Gestión de la IA</div>
  <div class="chat" id="chat"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Escribí tu consulta..." autocomplete="off">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// ==========================================
// CATÁLOGO SIMULADO APDP
// ==========================================
const catalog = [
  // Pickups
  { sku: "AP-4521", tipo: "Amortiguador delantero", marca: "Toyota", modelo: "Hilux 4x4", desde: 2016, hasta: 2020, precio: 65, stock: 140 },
  { sku: "AP-4522", tipo: "Amortiguador trasero", marca: "Toyota", modelo: "Hilux 4x4", desde: 2016, hasta: 2020, precio: 58, stock: 95 },
  { sku: "AP-4530", tipo: "Amortiguador delantero", marca: "Toyota", modelo: "Hilux 4x4", desde: 2021, hasta: 2024, precio: 72, stock: 80 },
  { sku: "AP-4531", tipo: "Amortiguador trasero", marca: "Toyota", modelo: "Hilux 4x4", desde: 2021, hasta: 2024, precio: 64, stock: 72 },
  { sku: "AP-3201", tipo: "Amortiguador delantero", marca: "Ford", modelo: "Ranger", desde: 2012, hasta: 2019, precio: 62, stock: 110 },
  { sku: "AP-3202", tipo: "Amortiguador trasero", marca: "Ford", modelo: "Ranger", desde: 2012, hasta: 2019, precio: 55, stock: 88 },
  { sku: "AP-3210", tipo: "Amortiguador delantero", marca: "Ford", modelo: "Ranger", desde: 2020, hasta: 2024, precio: 70, stock: 65 },
  { sku: "AP-3211", tipo: "Amortiguador trasero", marca: "Ford", modelo: "Ranger", desde: 2020, hasta: 2024, precio: 62, stock: 58 },
  { sku: "AP-2105", tipo: "Amortiguador delantero", marca: "Volkswagen", modelo: "Amarok", desde: 2010, hasta: 2020, precio: 68, stock: 9 },
  { sku: "AP-2106", tipo: "Amortiguador trasero", marca: "Volkswagen", modelo: "Amarok", desde: 2010, hasta: 2020, precio: 60, stock: 0 },
  { sku: "AP-1810", tipo: "Amortiguador delantero", marca: "Chevrolet", modelo: "S10", desde: 2012, hasta: 2020, precio: 60, stock: 75 },
  { sku: "AP-1811", tipo: "Amortiguador trasero", marca: "Chevrolet", modelo: "S10", desde: 2012, hasta: 2020, precio: 53, stock: 60 },
  // Autos
  { sku: "AP-5510", tipo: "Amortiguador delantero", marca: "Renault", modelo: "Sandero", desde: 2014, hasta: 2024, precio: 45, stock: 180 },
  { sku: "AP-5511", tipo: "Amortiguador trasero", marca: "Renault", modelo: "Sandero", desde: 2014, hasta: 2024, precio: 40, stock: 165 },
  { sku: "AP-5520", tipo: "Amortiguador delantero", marca: "Renault", modelo: "Kangoo", desde: 2010, hasta: 2020, precio: 48, stock: 92 },
  { sku: "AP-5521", tipo: "Amortiguador trasero", marca: "Renault", modelo: "Kangoo", desde: 2010, hasta: 2020, precio: 42, stock: 85 },
  { sku: "AP-6010", tipo: "Amortiguador delantero", marca: "Fiat", modelo: "Cronos", desde: 2018, hasta: 2024, precio: 42, stock: 200 },
  { sku: "AP-6011", tipo: "Amortiguador trasero", marca: "Fiat", modelo: "Cronos", desde: 2018, hasta: 2024, precio: 38, stock: 175 },
  { sku: "AP-7010", tipo: "Amortiguador delantero", marca: "Peugeot", modelo: "208", desde: 2013, hasta: 2023, precio: 44, stock: 130 },
  { sku: "AP-7011", tipo: "Amortiguador trasero", marca: "Peugeot", modelo: "208", desde: 2013, hasta: 2023, precio: 39, stock: 115 },
  { sku: "AP-8010", tipo: "Amortiguador delantero", marca: "Volkswagen", modelo: "Gol", desde: 2013, hasta: 2024, precio: 40, stock: 220 },
  { sku: "AP-8011", tipo: "Amortiguador trasero", marca: "Volkswagen", modelo: "Gol", desde: 2013, hasta: 2024, precio: 36, stock: 195 },
  // Extremos de dirección
  { sku: "ED-1001", tipo: "Extremo de dirección", marca: "Toyota", modelo: "Hilux", desde: 2016, hasta: 2024, precio: 28, stock: 145 },
  { sku: "ED-1002", tipo: "Extremo de dirección", marca: "Ford", modelo: "Ranger", desde: 2012, hasta: 2024, precio: 26, stock: 120 },
  { sku: "ED-1003", tipo: "Extremo de dirección", marca: "Volkswagen", modelo: "Amarok", desde: 2010, hasta: 2024, precio: 27, stock: 90 },
  { sku: "ED-1010", tipo: "Extremo de dirección", marca: "Renault", modelo: "Sandero", desde: 2014, hasta: 2024, precio: 18, stock: 210 },
  // Rótulas
  { sku: "RT-2001", tipo: "Rótula de suspensión", marca: "Toyota", modelo: "Hilux", desde: 2016, hasta: 2024, precio: 22, stock: 160 },
  { sku: "RT-2002", tipo: "Rótula de suspensión", marca: "Ford", modelo: "Ranger", desde: 2012, hasta: 2024, precio: 21, stock: 140 },
  // Parrillas
  { sku: "PS-3001", tipo: "Parrilla de suspensión", marca: "Toyota", modelo: "Hilux", desde: 2016, hasta: 2024, precio: 95, stock: 45 },
  { sku: "PS-3002", tipo: "Parrilla de suspensión", marca: "Ford", modelo: "Ranger", desde: 2012, hasta: 2024, precio: 90, stock: 38 },
];

const distribuidor = { nombre: "Repuestera Mendoza", descuento: 22 };

// ==========================================
// MOTOR DE INTENCIÓN (pattern matching)
// ==========================================
function normalize(s) {
  return s.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ").trim();
}

function detectBrand(text) {
  const brands = {
    "toyota": "Toyota", "ford": "Ford", "volkswagen": "Volkswagen", "vw": "Volkswagen",
    "chevrolet": "Chevrolet", "chevy": "Chevrolet", "renault": "Renault",
    "fiat": "Fiat", "peugeot": "Peugeot"
  };
  for (const [k, v] of Object.entries(brands)) {
    if (text.includes(k)) return v;
  }
  return null;
}

function detectModel(text) {
  const models = {
    "hilux": "Hilux", "ranger": "Ranger", "amarok": "Amarok", "s10": "S10",
    "sandero": "Sandero", "kangoo": "Kangoo", "cronos": "Cronos",
    "208": "208", "gol": "Gol"
  };
  for (const [k, v] of Object.entries(models)) {
    if (text.includes(k)) return v;
  }
  return null;
}

function detectYear(text) {
  const m = text.match(/\b(19|20)\d{2}\b/);
  return m ? parseInt(m[0]) : null;
}

function detect4x4(text) {
  return /\b4x4|4\s*x\s*4|cuatro\s*por\s*cuatro\b/.test(text);
}

function detectPart(text) {
  if (/amortiguador|amorti/.test(text)) return "Amortiguador";
  if (/extremo|direccion|direccion/.test(text)) return "Extremo de dirección";
  if (/rotula|rotulas/.test(text)) return "Rótula de suspensión";
  if (/parrilla|brazo|suspensio?n/.test(text)) return "Parrilla de suspensión";
  return null;
}

function detectPosition(text) {
  if (/delante|frontal|adelante/.test(text)) return "delantero";
  if (/trasero|atras|posterior/.test(text)) return "trasero";
  return null;
}

function detectIntent(text) {
  if (/\bhola|buenas|buen\s*dia|buenos\s*dias\b/.test(text)) return "saludo";
  if (/\bayuda|ayudar|como\s*funciona|que\s*hace|que\s*podes\b/.test(text)) return "ayuda";
  if (/\bcatalogo|productos\b/.test(text)) return "catalogo";
  if (/\bcotizar|cotizacion|presupuesto\b/.test(text)) return "cotizar";
  if (/\bstock\b/.test(text)) return "stock";
  if (/\bgracias|chau|chao|hasta\b/.test(text)) return "despedida";
  if (/\bvendedor|humano|persona|hablar\b/.test(text)) return "escalar";
  return "consulta";
}

function detectSKU(text) {
  const m = text.match(/\b([A-Z]{2}-\d{4})\b/i);
  return m ? m[1].toUpperCase() : null;
}

// ==========================================
// BUSCADOR EN CATÁLOGO
// ==========================================
function searchProducts(filters) {
  return catalog.filter(p => {
    if (filters.marca && p.marca !== filters.marca) return false;
    if (filters.modelo) {
      const modelMatch = p.modelo.toLowerCase().includes(filters.modelo.toLowerCase());
      if (!modelMatch) return false;
    }
    if (filters.año && (filters.año < p.desde || filters.año > p.hasta)) return false;
    if (filters.tipo && !p.tipo.toLowerCase().includes(filters.tipo.toLowerCase())) return false;
    if (filters.posicion && !p.tipo.toLowerCase().includes(filters.posicion)) return false;
    if (filters.is4x4 && !p.modelo.toLowerCase().includes("4x4")) return false;
    return true;
  });
}

function stockBadge(stock) {
  if (stock === 0) return `<span class="stock-out">SIN STOCK</span>`;
  if (stock < 20) return `<span class="stock-low">STOCK BAJO (${stock} u.)</span>`;
  return `<span class="stock-ok">Stock OK (${stock} u.)</span>`;
}

function priceWithDiscount(price) {
  const neto = price * (1 - distribuidor.descuento / 100);
  return `USD ${price.toFixed(2)} lista — <strong>USD ${neto.toFixed(2)}</strong> con tu ${distribuidor.descuento}%`;
}

function formatProduct(p) {
  return `<div class="product-card">
    <strong>${p.sku}</strong> — ${p.tipo}<br>
    Aplicación: ${p.marca} ${p.modelo} ${p.desde}-${p.hasta}<br>
    ${priceWithDiscount(p.precio)}<br>
    ${stockBadge(p.stock)}
  </div>`;
}

// ==========================================
// GENERADOR DE RESPUESTAS
// ==========================================
function generateResponse(text) {
  const t = normalize(text);
  const intent = detectIntent(t);
  const sku = detectSKU(text);

  // Consulta por SKU directo
  if (sku) {
    const p = catalog.find(x => x.sku === sku);
    if (p) {
      return { text: `Acá tenés el detalle del ${sku}:`, html: formatProduct(p), quickReplies: ["Cotizar este producto", "Ver otros amortiguadores"] };
    } else {
      return { text: `No encuentro el SKU ${sku} en mi catálogo. Verificá la nomenclatura o consultame por marca y modelo del vehículo.` };
    }
  }

  switch (intent) {
    case "saludo":
      return {
        text: `Hola ${distribuidor.nombre}! 👋\nSoy el asistente comercial de APDP. Estoy disponible 24/7 para consultas sobre productos, stock y precios.\n\n¿En qué puedo ayudarte?`,
        quickReplies: ["Consultar por un vehículo", "Ver catálogo", "Hablar con vendedor"]
      };

    case "ayuda":
      return {
        text: `Te puedo ayudar con:\n\n• Buscar el producto correcto para un vehículo (ej: "amortiguador para Hilux 2018")\n• Consultar stock y precios\n• Generar pre-cotizaciones\n• Conectarte con tu vendedor asignado\n\nProbá escribir marca y modelo del vehículo del cliente.`,
        quickReplies: ["Hilux 4x4 2018", "Renault Sandero 2020", "Ranger 2015"]
      };

    case "catalogo":
      const marcas = [...new Set(catalog.map(p => p.marca))];
      return {
        text: `Tenemos productos para las principales marcas del mercado argentino:\n\n${marcas.map(m => "• " + m).join("\n")}\n\nDecime marca y modelo del vehículo y te paso las opciones disponibles.`,
        quickReplies: ["Toyota Hilux", "Ford Ranger", "Volkswagen Amarok"]
      };

    case "despedida":
      return {
        text: `Un placer ayudarte, ${distribuidor.nombre}. Cualquier consulta estoy disponible 24/7. 👋`
      };

    case "escalar":
      return {
        text: `Perfecto, te conecto con tu vendedor asignado.\n\n📞 Vendedor: Diego Fernández\n📱 +54 9 11 4567-8901\n📧 diego.fernandez@autopartesdelplata.com.ar\n\nLe estoy reenviando el contexto de nuestra conversación. Se va a comunicar con vos durante el horario comercial (mañana 9:00).`
      };

    case "consulta":
    default:
      // Lógica principal de búsqueda
      const filters = {
        marca: detectBrand(t),
        modelo: detectModel(t),
        año: detectYear(t),
        tipo: detectPart(t),
        posicion: detectPosition(t),
        is4x4: detect4x4(t)
      };

      // Si no hay nada detectado
      if (!filters.marca && !filters.modelo && !filters.tipo) {
        return {
          text: `Disculpame, no me quedó claro. ¿Me podés decir marca y modelo del vehículo? Por ejemplo: "amortiguador para Toyota Hilux 2018".`,
          quickReplies: ["Hilux 4x4 2018", "Ranger 2015", "Sandero 2020"]
        };
      }

      let results = searchProducts(filters);

      // Si no hay resultados con todos los filtros, intentar relajar
      if (results.length === 0 && filters.año) {
        const relaxed = { ...filters, año: null };
        const altResults = searchProducts(relaxed);
        if (altResults.length > 0) {
          const aniosDisp = [...new Set(altResults.map(p => `${p.desde}-${p.hasta}`))].join(", ");
          return {
            text: `Encontré productos para ${filters.marca || ""} ${filters.modelo || ""} pero no específicamente para el año ${filters.año}. Los años cubiertos son: ${aniosDisp}.\n\n¿Querés que te muestre las opciones disponibles?`,
            quickReplies: ["Sí, mostrame las opciones", "Conectame con vendedor"]
          };
        }
      }

      if (results.length === 0) {
        return {
          text: `No tengo en catálogo el producto para esa combinación. Si querés, te conecto con un vendedor humano para que evalúe alternativas o pedidos especiales.`,
          quickReplies: ["Hablar con vendedor", "Ver catálogo"]
        };
      }

      // Limitar a 4 resultados
      const limited = results.slice(0, 4);
      const restantes = results.length - limited.length;

      let response = "";
      if (filters.marca && filters.modelo && filters.año) {
        response = `Para ${filters.marca} ${filters.modelo} ${filters.año} ${filters.is4x4 ? "4x4 " : ""}tengo estas opciones:`;
      } else if (filters.marca && filters.modelo) {
        response = `Para ${filters.marca} ${filters.modelo} tengo estas opciones disponibles:`;
      } else {
        response = `Encontré ${results.length} producto${results.length > 1 ? "s" : ""} que coincide${results.length > 1 ? "n" : ""} con tu consulta:`;
      }

      const html = limited.map(formatProduct).join("");
      const extra = restantes > 0 ? `\n\nHay ${restantes} producto${restantes > 1 ? "s" : ""} más en el catálogo. ¿Querés que te los muestre o filtrás más?` : "";

      return {
        text: response + extra,
        html: html,
        quickReplies: ["Cotizar", "Más opciones", "Hablar con vendedor"]
      };
  }
}

// ==========================================
// UI
// ==========================================
const chat = document.getElementById("chat");
const userInput = document.getElementById("userInput");

function addMessage(text, sender, html, quickReplies) {
  const msg = document.createElement("div");
  msg.className = `message ${sender}`;
  msg.innerHTML = text.replace(/\n/g, "<br>") + (html ? html : "");
  chat.appendChild(msg);

  if (quickReplies && quickReplies.length > 0) {
    const qr = document.createElement("div");
    qr.className = "quick-replies";
    quickReplies.forEach(reply => {
      const btn = document.createElement("button");
      btn.textContent = reply;
      btn.onclick = () => {
        userInput.value = reply;
        sendMessage();
      };
      qr.appendChild(btn);
    });
    chat.appendChild(qr);
  }

  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const t = document.createElement("div");
  t.className = "message bot typing";
  t.id = "typing-indicator";
  t.innerHTML = "<span></span><span></span><span></span>";
  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById("typing-indicator");
  if (t) t.remove();
}

function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  // Remover quick replies anteriores
  document.querySelectorAll(".quick-replies").forEach(el => el.remove());

  addMessage(text, "user");
  userInput.value = "";

  showTyping();
  setTimeout(() => {
    hideTyping();
    const resp = generateResponse(text);
    addMessage(resp.text, "bot", resp.html, resp.quickReplies);
  }, 600 + Math.random() * 600);
}

userInput.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// Mensaje inicial
window.onload = () => {
  setTimeout(() => {
    addMessage(`👋 Hola! Soy el Asistente Comercial de APDP.\n\nEstás conectado como: <strong>${distribuidor.nombre}</strong> (descuento ${distribuidor.descuento}%).\n\nPodés consultarme sobre productos, stock, precios o pedir cotización. Probá con algún ejemplo:`, "bot", null, [
      "Necesito amortiguador para Hilux 4x4 2018",
      "Tienen para Sandero 2020?",
      "Stock del SKU AP-3201",
      "¿Cómo funcionás?"
    ]);
  }, 400);
};
</script>
</body>
</html>
